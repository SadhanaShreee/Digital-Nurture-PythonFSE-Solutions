<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal - JavaScript Interactivity</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <p class="site-name">Student Portal</p>
    <p class="hamburger">☰ Menu</p>
    <nav class="main-nav">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Courses</a></li>
        <li><a href="#">Profile</a></li>
        <li><a href="#">Grades</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="hero">
      <h1>Welcome to the Student Portal</h1>
      <p>Access your courses, track your grades, and manage your profile all in one place.</p>
      <button>Explore Courses</button>
    </section>

    <section class="stats-bar">
      <div class="stat-item">
        <p class="stat-number">3</p>
        <p class="stat-label">Courses Enrolled</p>
      </div>
      <div class="stat-item">
        <p class="stat-number">3.8</p>
        <p class="stat-label">GPA</p>
      </div>
      <div class="stat-item">
        <p class="stat-number">6</p>
        <p class="stat-label">Semester</p>
      </div>
    </section>

    <section class="courses">
      <h2>Available Courses</h2>

      <!-- Step 40: search input above the grid -->
      <input
        type="text"
        class="search-input"
        placeholder="Search courses by name..."
      >

      <!-- Step 42: sort control -->
      <button class="sort-button">Sort by Credits</button>

      <!-- Step 35: grid container left EMPTY — JavaScript renders the cards -->
      <div class="course-grid"></div>

      <!-- Step 39: total credits, filled in dynamically by app.js -->
      <p class="total-credits"></p>

      <!-- Step 43: shows details of whichever card was last clicked -->
      <p class="course-details"></p>
    </section>

  </main>

  <footer>
    <p>&copy; 2026 Student Portal. All rights reserved.</p>
  </footer>

  <!-- type="module" is required so app.js can use ES6 import/export -->
  <script type="module" src="app.js"></script>

</body>
</html>
